name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: build ${{ matrix.engine }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        # Fast lib builds. `system_jsc` links the OS framework (no WebKit build);
        # `quickjs` compiles the vendored sources. The vendored-WebKit `jsc`
        # build + the full backend deno matrix run locally / self-hosted
        # (tests/modules/matrix.sh) — a from-scratch WebKit build is too heavy
        # for per-push CI.
        engine: [system_jsc, quickjs]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.engine }}

      - name: Build (${{ matrix.engine }})
        run: cargo build --no-default-features --features ${{ matrix.engine }} --lib

  module-tests:
    name: module suite (stock-v8 oracle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run ES-module conformance suite
        run: tests/modules/run.sh "$(command -v deno)" stock-v8

  # Build a real deno on the vendored-JSC backend (WebKit builds from source in
  # ~11min via build.rs) and run the full module suite against it — same
  # byte-for-byte expectations as the stock-v8 oracle.
  deno-jsc:
    name: deno (vendored JSC) module suite
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: deno-jsc
      - name: Install ninja (WebKit build)
        run: brew install ninja

      - name: Clone deno + apply the JSC integration patch
        run: |
          set -euo pipefail
          DENO_REF="$(cat tools/deno/DENO_REF)"
          mkdir -p ../deno && git -C ../deno init -q
          git -C ../deno remote add origin https://github.com/denoland/deno
          git -C ../deno fetch --depth 1 origin "$DENO_REF"
          git -C ../deno checkout -q FETCH_HEAD
          # The patch's [patch.crates-io] v8 path is a local dev path — point it
          # at this checkout.
          sed "s#/Users/divy/gh/v82jsc#${GITHUB_WORKSPACE}#g" \
            tools/deno/deno-jsc-integration.patch > /tmp/deno-jsc.patch
          git -C ../deno apply --3way /tmp/deno-jsc.patch || git -C ../deno apply /tmp/deno-jsc.patch

      - name: Build deno (vendored JSC; builds WebKit from source)
        working-directory: ../deno
        run: |
          set -euo pipefail
          export RUSTFLAGS="-C link-arg=-fuse-ld=/usr/bin/ld -C link-arg=-L$(xcrun --show-sdk-path)/usr/lib"
          cargo build --release --bin deno --features hmr
          codesign --force --sign - --entitlements cli/entitlements.plist target/release/deno

      - name: Run ES-module conformance suite on deno-JSC
        run: tests/modules/run.sh "../deno/target/release/deno" jsc-vendored

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin the toolchain so the rustfmt rules match local. src/lib.rs is NOT
      # checked: it `#[path]`-includes the vendored rusty_v8 modules (only
      # materialized by build.rs), so rustfmt can't resolve its mod tree.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt
      - run: rustfmt --edition 2024 --check src/jsc/*.rs src/quickjs/*.rs

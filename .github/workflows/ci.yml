name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer push to the same ref cancels the older in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Fast checks: `cargo build --lib` per backend. Catches compile breakage
  # without building a full deno. quickjs is cross-platform (ubuntu); the JSC
  # backends need macOS (system_jsc links the OS framework, jsc builds the
  # vendored WebKit from source — cached, see below).
  # ---------------------------------------------------------------------------
  check:
    name: check-${{ matrix.backend }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: quickjs
            os: ubuntu-latest
            features: quickjs
          - backend: sys-jsc
            os: macos-latest
            features: system_jsc
          - backend: jsc
            os: macos-15
            features: engine_jsc,vendor_jsc
            ninja: true
    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.backend }}
      - name: Install ninja (WebKit build)
        if: matrix.ninja
        run: brew install ninja
      # Cache the vendored WebKit static-lib build (~13min from scratch). Keyed
      # on the pinned submodule commit + the patches/setup script, so it's
      # reused until WebKit or our patches change. build.rs skips the heavy
      # build when libJavaScriptCore.a is already present (patches-only).
      - name: WebKit cache key
        if: matrix.ninja
        id: wk
        run: echo "sha=$(git rev-parse HEAD:vendor/webkit)" >> "$GITHUB_OUTPUT"
      - name: Cache vendored WebKit build
        if: matrix.ninja
        uses: actions/cache@v4
        with:
          path: vendor/webkit/WebKitBuild
          key: webkit-${{ runner.os }}-${{ steps.wk.outputs.sha }}-${{ hashFiles('patches/**', 'tools/setup_webkit.sh') }}
      - name: Build --lib (${{ matrix.features }})
        run: cargo build --no-default-features --features ${{ matrix.features }} --lib

      # --- hill-climb: rusty_v8 suite (build tier) ---------------------------
      # Cheapest suite — vendored rusty_v8 integration tests run unmodified
      # against our shim ([[test]] rv8_* in Cargo.toml). PRs ratchet strictly
      # (--check: red on regression or un-baselined new pass); main just records
      # a run-result artifact the `report` job folds in.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: rusty_v8 suite (${{ matrix.backend }})
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node tests/harness/run.mjs rusty_v8 ${{ matrix.backend }} --check
          else
            node tests/harness/run.mjs rusty_v8 ${{ matrix.backend }}
          fi
      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runs-${{ matrix.backend }}-rusty_v8
          path: status/.runs/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Real deno on each v82jsc backend, run against the ES-module conformance
  # suite (byte-for-byte vs the stock-v8 oracle). All on macOS so the JSC
  # backends link/JIT correctly; quickjs rides along on the same runner.
  # ---------------------------------------------------------------------------
  deno:
    name: deno-${{ matrix.backend }}
    runs-on: macos-15
    timeout-minutes: 120
    # macOS 15+: WebKit's bmalloc uses os_unfair_lock_lock_with_flags (15.0+),
    # fatal under -Werror=unguarded-availability on an older deployment target.
    env:
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: jsc
            features: '"engine_jsc", "vendor_jsc"'
            ninja: true
          - backend: sys-jsc
            features: '"system_jsc"'
          - backend: quickjs
            features: '"quickjs"'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ninja (WebKit build)
        if: matrix.ninja
        run: brew install ninja

      # Reuse the vendored WebKit build across runs (jsc backend only).
      - name: WebKit cache key
        if: matrix.ninja
        id: wk
        run: echo "sha=$(git rev-parse HEAD:vendor/webkit)" >> "$GITHUB_OUTPUT"
      - name: Cache vendored WebKit build
        if: matrix.ninja
        uses: actions/cache@v4
        with:
          path: vendor/webkit/WebKitBuild
          key: webkit-${{ runner.os }}-${{ steps.wk.outputs.sha }}-${{ hashFiles('patches/**', 'tools/setup_webkit.sh') }}

      - name: Clone deno + apply the v82jsc integration patch
        run: |
          set -euo pipefail
          DENO_REF="$(cat tools/deno/DENO_REF)"
          mkdir -p ../deno && git -C ../deno init -q
          git -C ../deno remote add origin https://github.com/denoland/deno
          git -C ../deno fetch --depth 1 origin "$DENO_REF"
          git -C ../deno checkout -q FETCH_HEAD
          # The patch's [patch.crates-io] v8 path is a local dev path — point it
          # at this checkout.
          sed "s#/Users/divy/gh/v82jsc#${GITHUB_WORKSPACE}#g" \
            tools/deno/deno-jsc-integration.patch > /tmp/deno.patch
          git -C ../deno apply --3way /tmp/deno.patch || git -C ../deno apply /tmp/deno.patch
          # Select this job's backend by swapping the v82jsc feature list the
          # patch hardcodes (vendored JSC) for this matrix entry's features.
          perl -0pi -e 's/"engine_jsc", "vendor_jsc"/${{ matrix.features }}/g' ../deno/Cargo.toml

      # Cache deno's build (cargo deps + the v82jsc patch crate). Keyed per
      # backend so each engine's feature set gets its own cache. rust-cache
      # prunes to dependency artifacts — much smaller than the raw target dir.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "../deno"
          key: deno-${{ matrix.backend }}

      - name: Build deno (${{ matrix.backend }})
        working-directory: ../deno
        run: |
          set -euo pipefail
          export RUSTFLAGS="-C link-arg=-fuse-ld=/usr/bin/ld -C link-arg=-L$(xcrun --show-sdk-path)/usr/lib"
          cargo build --release --bin deno --features hmr
          codesign --force --sign - --entitlements cli/entitlements.plist target/release/deno

      - name: Run ES-module conformance suite
        run: tests/modules/run.sh "../deno/target/release/deno" "${{ matrix.backend }}"

      # --- hill-climb: deno_core + Deno node-compat + Deno unit -------------
      # deno_core is build-tier-ish (no full binary needed) but it needs the
      # deno checkout, so it rides here. node-compat + unit need the binary
      # built above. PRs ratchet strictly; main records run-result artifacts.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run hill-climb suites (${{ matrix.backend }})
        env:
          PR: ${{ github.event_name == 'pull_request' && '--check' || '' }}
        run: |
          set -uo pipefail
          DENO=../deno/target/release/deno
          rc=0
          for suite in deno_core deno_node_compat deno_unit; do
            node tests/harness/run.mjs "$suite" "${{ matrix.backend }}" $PR \
              --deno-dir=../deno --deno-bin="$DENO" || rc=$?
          done
          exit $rc
      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runs-${{ matrix.backend }}-deno
          path: status/.runs/
          if-no-files-found: ignore

  module-tests:
    name: module suite (stock-v8 oracle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run ES-module conformance suite
        run: tests/modules/run.sh "$(command -v deno)" stock-v8

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin the toolchain so the rustfmt rules match local. src/lib.rs is NOT
      # checked: it `#[path]`-includes the vendored rusty_v8 modules (only
      # materialized by build.rs), so rustfmt can't resolve its mod tree.
      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt
      - run: rustfmt --edition 2024 --check src/jsc/*.rs src/quickjs/*.rs

  # ---------------------------------------------------------------------------
  # Single-writer aggregation. Runs only on push to main (after merge), once,
  # gathering every matrix job's run-result artifacts. Folds fresh pass sets
  # into the committed baselines (--write-baselines), regenerates the single
  # status/report.json and appends a status/history.jsonl snapshot, then commits
  # + pushes. Because only this job writes those files, parallel PRs never
  # conflict on them. The Pages workflow redeploys the dashboard on that commit.
  # ---------------------------------------------------------------------------
  report:
    name: aggregate report
    needs: [check, deno]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # Deploys Pages directly (the [skip ci] commit below won't trigger pages.yml).
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download all run-result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: runs-*
          path: /tmp/runs
          merge-multiple: true
      - name: Collect run results
        run: |
          mkdir -p status/.runs
          cp -v /tmp/runs/*.json status/.runs/ 2>/dev/null || echo "no run results"
      - name: Aggregate (baselines + report + history)
        run: node tests/harness/aggregate.mjs --write-baselines --commit="${GITHUB_SHA}"
      - name: Commit + push
        run: |
          git config user.name  "v82jsc-bot"
          git config user.email "bot@users.noreply.github.com"
          git add status/baselines status/report.json status/history.jsonl
          if git diff --cached --quiet; then
            echo "no changes to report"
          else
            git commit -m "ci: update test report [skip ci]"
            git push origin main
          fi
      - name: Assemble dashboard
        run: |
          mkdir -p _site
          cp docs/index.html _site/
          cp status/report.json _site/report.json
          cp status/history.jsonl _site/history.jsonl 2>/dev/null || : > _site/history.jsonl
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4

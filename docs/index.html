<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>v8x test suite</title>
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/dist/plot.umd.min.js"></script>
    <style>
      :root {
        --bg: #0b0e14; --panel: #11151f; --border: #232938;
        --fg: #e6edf3; --muted: #8b949e; --accent: #6ea8fe;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--fg);
        font: 14px/1.55 ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 40px 24px; max-width: 980px; margin: 0 auto;
        -webkit-font-smoothing: antialiased;
      }
      h1 { font-size: 22px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
      .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
      h2 { font-size: 12px; color: var(--muted); margin: 40px 0 14px; font-weight: 600;
           text-transform: uppercase; letter-spacing: 0.08em; }
      .stats { display: flex; gap: 14px; margin: 24px 0 8px; flex-wrap: wrap; }
      .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
              padding: 16px 20px; flex: 1; min-width: 130px; }
      .stat .n { font-size: 28px; font-weight: 680; letter-spacing: -0.02em; }
      .stat .l { color: var(--muted); font-size: 11px; text-transform: uppercase;
                 letter-spacing: 0.06em; margin-top: 2px; }
      .panel { background: var(--panel); border: 1px solid var(--border);
               border-radius: 12px; padding: 18px 20px; overflow-x: auto; }
      figure { margin: 0; }
      a { color: var(--accent); text-decoration: none; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
             color: var(--muted); }
    </style>
  </head>
  <body>
    <h1>v8x test suite</h1>
    <div class="sub" id="meta">loading…</div>

    <div class="stats" id="stats"></div>

    <h2>Matrix — passing per backend × suite</h2>
    <div class="panel"><div id="matrix"></div></div>

    <h2>Progress over time</h2>
    <div class="panel"><div id="history"></div></div>

    <h2>Passing by suite</h2>
    <div class="panel"><div id="bars"></div></div>

    <script type="module">
      const C = {
        bg: "transparent", fg: "#e6edf3", muted: "#8b949e", grid: "#232938",
        scheme: ["#6ea8fe", "#3fb950", "#d29922", "#bc8cff", "#ff7b72"],
      };
      const plotBase = {
        style: { background: "transparent", color: C.fg, fontSize: "12px" },
        marginLeft: 90, marginBottom: 36,
      };

      const report = await fetch("report.json").then((r) => r.json()).catch(() => null);
      if (!report) { document.getElementById("meta").textContent = "no report.json yet"; }
      else render(report, await fetch("history.jsonl").then((r) => r.text()).then(parseJsonl).catch(() => []));

      function parseJsonl(t) {
        return t.split("\n").filter(Boolean).map((l) => { try { return JSON.parse(l); } catch { return null; } }).filter(Boolean);
      }

      function render(report, history) {
        const backends = report.backends, suites = report.suites;
        const cells = [];
        for (const b of backends) for (const s of suites) {
          const c = report.cells[b.id][s.id];
          cells.push({ backend: b.label, suite: s.label, pass: c.pass, total: c.total,
            rate: c.total ? c.pass / c.total : 0, label: c.total != null ? `${c.pass}/${c.total}` : `${c.pass}` });
        }
        const known = cells.reduce((a, c) => a + (c.total || 0), 0);

        document.getElementById("meta").innerHTML =
          `commit <code>${report.commit.slice(0, 12)}</code> · updated ${new Date(report.generated).toLocaleString()}`;

        document.getElementById("stats").innerHTML = `
          <div class="stat"><div class="n">${report.totals.pass}</div><div class="l">passing</div></div>
          <div class="stat"><div class="n">${known || "—"}</div><div class="l">known (built)</div></div>
          <div class="stat"><div class="n">${known ? Math.round((report.totals.pass / known) * 100) + "%" : "—"}</div><div class="l">pass rate</div></div>
          <div class="stat"><div class="n">${backends.length}×${suites.length}</div><div class="l">backends × suites</div></div>`;

        // Matrix heatmap with value labels.
        document.getElementById("matrix").append(Plot.plot({
          ...plotBase, marginTop: 10, height: 70 + backends.length * 46,
          x: { domain: suites.map((s) => s.label), label: null, tickSize: 0 },
          y: { domain: backends.map((b) => b.label), label: null, tickSize: 0 },
          color: { type: "linear", domain: [0, 1], range: ["#1b2030", "#3fb950"], legend: false },
          marks: [
            Plot.cell(cells, { x: "suite", y: "backend", fill: "rate", rx: 8, inset: 4 }),
            Plot.text(cells, { x: "suite", y: "backend", text: "label", fill: C.fg, fontSize: 14, fontWeight: 600 }),
          ],
        }));

        // Progress over time.
        const hist = history.flatMap((snap) =>
          Object.entries(snap.pass || {}).map(([k, v]) => ({ date: new Date(snap.ts), series: k, pass: v })));
        const histNode = hist.length
          ? Plot.plot({
              ...plotBase, height: 300,
              x: { label: null, grid: false },
              y: { label: "passing", grid: true, nice: true },
              color: { legend: true, scheme: "set2" },
              marks: [
                Plot.ruleY([0], { stroke: C.grid }),
                Plot.lineY(hist, { x: "date", y: "pass", stroke: "series", curve: "monotone-x", strokeWidth: 2, marker: "circle" }),
              ],
            })
          : note("no history yet — first CI run populates this");
        document.getElementById("history").append(histNode);

        // Passing by suite, grouped by backend.
        document.getElementById("bars").append(Plot.plot({
          ...plotBase, height: 110 + suites.length * 70, marginLeft: 120,
          x: { label: "passing", grid: true, nice: true },
          y: { label: null, tickSize: 0 },
          fy: { label: null },
          color: { legend: true, domain: backends.map((b) => b.label), range: C.scheme },
          marks: [
            Plot.barX(cells, { x: "pass", y: "backend", fy: "suite", fill: "backend", rx: 4, sort: { y: "-x" } }),
            Plot.text(cells, { x: "pass", y: "backend", fy: "suite", text: (d) => d.pass || "", dx: 12, fill: C.muted }),
            Plot.ruleX([0], { stroke: C.grid }),
          ],
        }));
      }

      function note(txt) { const d = document.createElement("div"); d.className = "sub"; d.textContent = txt; return d; }
    </script>
  </body>
</html>
